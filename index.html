<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Pendataan SE2026 — Kab. Banjarmasin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz@8..60&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --ink:#1c2630;
    --paper:#ffb347;
    --paper-raised:#ffffff;
    --rule:#d8d2c4;
    --accent:#b4452f;
    --accent-soft:#f0ddd4;
    --good:#3f6b4f;
    --good-soft:#e1ebe2;
    --warn:#a87b1f;
    --warn-soft:#f3e8d2;
    --muted:#6b6358;
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Source Serif 4', serif;
    --sans: 'Inter', sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans);}

  .wrap{max-width:1040px;margin:0 auto;padding:28px 20px 80px;}

  header.page{
    border-bottom:3px double var(--ink);
    padding-bottom:18px;
    margin-bottom:22px;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--accent);
    margin:0 0 8px;
  }
  h1{
    font-family:var(--serif);
    font-weight:700;
    font-size:clamp(26px,4vw,38px);
    line-height:1.08;
    margin:0 0 6px;
    letter-spacing:-.01em;
  }
  .sub{font-size:13.5px;color:var(--muted);margin:0;}

  /* ---- status bar (load state) ---- */
  .status-bar{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--muted);
    margin-bottom:18px;
  }
  .status-dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--rule);
    flex-shrink:0;
  }
  .status-dot.ok{background:var(--good);}
  .status-dot.err{background:var(--accent);}
  .status-dot.loading{background:var(--warn);animation:pulse 1s infinite ease-in-out;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  #refreshBtn{
    margin-left:auto;
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    background:transparent;
    border:1px solid var(--rule);
    border-radius:2px;
    padding:3px 10px;
    cursor:pointer;
  }
  #refreshBtn:hover{border-color:var(--ink);color:var(--ink);}

  /* ---- search box ---- */
  .lookup{
    background:var(--paper-raised);
    border:1px solid var(--rule);
    border-radius:3px;
    padding:20px 22px;
    margin-bottom:26px;
    box-shadow:0 1px 0 rgba(0,0,0,.02);
  }
  .lookup-label{
    font-family:var(--mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--muted);
    margin:0 0 10px;
    display:block;
  }
  .lookup-row{display:flex;gap:10px;}
  #nipInput{
    flex:1;
    font-family:var(--mono);
    font-size:17px;
    letter-spacing:.03em;
    padding:11px 14px;
    border:1.5px solid var(--ink);
    border-radius:2px;
    background:#fff;
    color:var(--ink);
  }
  #nipInput:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  #nipInput::placeholder{color:#a8a194;font-style:italic;}
  #clearBtn{
    font-family:var(--sans);
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    background:transparent;
    border:1.5px solid var(--rule);
    border-radius:2px;
    padding:0 18px;
    cursor:pointer;
  }
  #clearBtn:hover{border-color:var(--ink);color:var(--ink);}
  .hint{font-size:12px;color:var(--muted);margin:10px 0 0;}
  .hint b{color:var(--ink);font-family:var(--mono);font-weight:500;}

  /* ---- Super Filter Dropdown (NIP 9999) ---- */
  .super-filter{
    display:flex;
    gap:12px;
    margin-top:14px;
    padding-top:14px;
    border-top:1px dashed var(--rule);
  }
  .filter-group{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .filter-group label{
    font-family:var(--mono);
    font-size:10px;
    text-transform:uppercase;
    color:var(--muted);
  }
  .filter-group select{
    font-family:var(--sans);
    font-size:13.5px;
    padding:8px 10px;
    border:1px solid var(--ink);
    border-radius:2px;
    background:#fff;
    color:var(--ink);
    cursor:pointer;
  }

  /* ---- empty / not found / error ---- */
  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty-state .glyph{font-family:var(--mono);font-size:28px;color:var(--rule);margin-bottom:10px;display:block;}
  .empty-state p{margin:4px 0;font-size:13.5px;}

  .not-found, .load-error{
    background:var(--warn-soft);
    border:1px solid var(--warn);
    color:#5c4413;
    padding:14px 18px;
    border-radius:3px;
    font-size:13.5px;
    font-family:var(--mono);
  }
  .load-error{background:var(--accent-soft);border-color:var(--accent);color:#7a2e1c;}

  /* ---- Task Force header card ---- */
  .tf-header{background:var(--ink);color:#fff;border-radius:3px 3px 0 0;padding:18px 22px;}
  .tf-id{font-family:var(--mono);font-size:11px;color:#cfc6b4;letter-spacing:.06em;}
  .tf-name{font-family:var(--serif);font-size:23px;font-weight:700;margin:4px 0 0;}
  .tf-stats{display:flex;gap:24px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.18);}
  .tf-stats .stat .num{color:#fff;}
  .tf-stats .stat .lbl{color:#a8a194;}
  .stat{font-family:var(--mono);}
  .stat .num{font-size:19px;font-weight:600;color:var(--ink);display:block;}
  .stat .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}

  .pml-list{background:var(--paper-raised);border:1px solid var(--rule);border-top:none;border-radius:0 0 3px 3px;overflow:hidden;}

  .pml-card{border-bottom:1px solid var(--rule);cursor:pointer;user-select:none;}
  .pml-card:last-child{border-bottom:none;}
  .pml-card-top{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:15px 22px;transition:background .15s ease;}
  .pml-card-top:hover{background:#fbfaf6;}
  .pml-card.open .pml-card-top{background:var(--good-soft);}

  .pml-name-block .pml-name{font-family:var(--serif);font-size:17px;font-weight:700;margin:0;}
  .pml-name-block .pml-meta{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .pml-name-block .pml-meta span{margin-right:12px;}
  .pml-name-block .pml-meta b{color:var(--ink);font-weight:600;}

  .pml-mini-stats{display:flex;gap:18px;flex-shrink:0;}
  .mini-stat{font-family:var(--mono);text-align:right;}
  .mini-stat .num{font-size:15px;font-weight:600;color:var(--ink);display:block;}
  .mini-stat .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}

  .chevron{
    font-family:var(--mono);font-size:12px;color:var(--muted);
    background:var(--paper);border:1px solid var(--rule);border-radius:50%;
    width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:transform .2s ease;
  }
  .pml-card.open .chevron{transform:rotate(180deg);}

  .detail-wrap{max-height:0;overflow:hidden;transition:max-height .28s ease;}
  .detail-wrap.open{max-height:3000px;}
  .detail-inner{padding:0 22px 18px;}

  table.ppl-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.ppl-table caption{text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:10px 0 8px;}
  table.ppl-table thead th{text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1.5px solid var(--ink);padding:6px 8px;white-space:nowrap;}
  table.ppl-table thead th.num{text-align:right;}
  table.ppl-table tbody td{padding:8px 8px;border-bottom:1px solid var(--rule);}
  table.ppl-table tbody td.num{text-align:right;font-family:var(--mono);font-size:12px;}
  table.ppl-table tbody tr:hover{background:#fbfaf6;}

  .pct-bar-cell{display:flex;align-items:center;gap:7px;justify-content:flex-end;}
  .pct-track{width:40px;height:5px;background:var(--rule);border-radius:3px;overflow:hidden;flex-shrink:0;}
  .pct-fill{height:100%;background:var(--good);}
  .pct-fill.low{background:var(--warn);}

  footer.page{margin-top:40px;padding-top:14px;border-top:1px solid var(--rule);font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.03em;}

  @media (max-width:600px){
    .pml-card-top{flex-direction:column;align-items:flex-start;gap:10px;}
    .pml-mini-stats{gap:14px;}
    .tf-stats{flex-wrap:wrap;gap:14px;}
    .detail-inner{padding:0 8px 14px;}
    table.ppl-table{font-size:10.5px;}
    table.ppl-table thead th, table.ppl-table tbody td{padding:6px 4px;}
    .pct-track{width:25px;}
    .lookup-row{flex-direction:column;}
    .super-filter{flex-direction:column;gap:10px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="page">
    <p class="eyebrow">Sensus Ekonomi 2026 · Kab/Kota 6371</p>
    <h1>Monitoring Progress Pendataan</h1>
    <p class="sub">Masukkan NIP Task Force untuk menampilkan seluruh PML dan PPL di bawahnya.</p>
  </header>

  <div class="status-bar">
    <span class="status-dot loading" id="statusDot"></span>
    <span id="statusText">Memuat data terbaru…</span>
    <button id="refreshBtn" type="button">↻ Refresh data</button>
  </div>

  <div class="lookup">
    <label class="lookup-label" for="nipInput">Cari berdasarkan NIP Task Force</label>
    <div class="lookup-row">
      <input id="nipInput" type="text" inputmode="numeric" placeholder="Ketik atau tempel NIP, contoh: 340062842" autocomplete="off" disabled>
      <button id="clearBtn" type="button">Bersihkan</button>
    </div>
    <p class="hint" id="hintText">Memuat daftar Task Force…</p>
    
    <div id="superFilterArea" class="super-filter" style="display:none;">
      <div class="filter-group">
        <label for="filterKec">Kecamatan</label>
        <select id="filterKec"></select>
      </div>
      <div class="filter-group">
        <label for="filterTfPml">Task Force / PML</label>
        <select id="filterTfPml"></select>
      </div>
    </div>
  </div>

  <div id="resultArea"></div>

  <footer class="page">
    DATA SUMBER: PROGRESS PPL · SE2026 — DIAMBIL LANGSUNG DARI GOOGLE SHEETS SAAT HALAMAN DIBUKA
  </footer>
</div>

<script>
// ====== KONFIGURASI ======
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXpVwhWEVGDNmGefdCjapaDYWD_b7V_KOdhpdIE2ZB2SzAmxD4u2oplc5rSzOyTGLm-0F-9XBxm8ja/pub?gid=2111234947&single=true&output=csv";

// Peta NIP dengan tambahan NIP khusus 9999
const NIP_MAP = {"9999":"SUPERVISOR ALL TASK FORCE","340019495":"M.TAUFIK R","132311851":"IMA","340015186":"NURUDDIN ZAIN","340015557":"SYAKERANI","340050198":"PRATIWI","340055352":"NOORHAMIMAH","340056117":"FARIDA AMINA","340016618":"DWI SETYO MAYLENA","340056874":"RAISA NOOR MAULIDA","340018139":"JUNAIDI EFENDI","340018823":"M.IQBAL","340055342":"DANY THERESA","340057558":"RISKA FINA AYUNINDA","340058750":"GHITA","340060168":"KHALISTA","340061619":"ADIMA LULUATUN","340063514":"SALMA AFNA H. H","340066120":"ANNISA","340066397":"NASYWA","340012390":"AL AMIN","340065201":"IMRON","340052140":"IRWAN","340065025":"SAFWAN","340016619":"JULIANA ADMAKA","340019091":"LISDA FITRIAWATI","340062842":"HENDRA"};

const STORAGE_KEY = 'se2026_nip_terakhir';

let DATA = [];

const elInput = document.getElementById('nipInput');
const elResult = document.getElementById('resultArea');
const elClear = document.getElementById('clearBtn');
const elHint = document.getElementById('hintText');
const elStatusDot = document.getElementById('statusDot');
const elStatusText = document.getElementById('statusText');
const elRefreshBtn = document.getElementById('refreshBtn');

const elSuperFilterArea = document.getElementById('superFilterArea');
const elFilterKec = document.getElementById('filterKec');
const elFilterTfPml = document.getElementById('filterTfPml');

function fmt(n){ if(n===null||n===undefined||isNaN(n)) return '–'; return Number(n).toLocaleString('id-ID',{maximumFractionDigits:0}); }
function fmtDec(n){ if(n===null||n===undefined||isNaN(n)) return '–'; return Number(n).toLocaleString('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtPct(n){ if(n===null||n===undefined||isNaN(n)) return '–'; return Number(n).toLocaleString('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2})+'%'; }
function escapeHtml(str){ if(str===null||str===undefined) return ''; return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toNum(s){
  if (s===undefined||s===null) return null;
  s = String(s).trim();
  if (s === '') return null;
  
  if (s.includes(',') && s.includes('.')) {
    s = s.replace(/\./g, '').replace(/,/g, '.');
  } else if (s.includes(',') && !s.includes('.')) {
    s = s.replace(/,/g, '.');
  } else if (s.match(/^\d{1,3}(\.\d{3})+$/)) {
    s = s.replace(/\./g, '');
  }
  
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i=0; i<text.length; i++){
    const ch = text[i];
    if (inQuotes){
      if (ch === '"'){
        if (text[i+1] === '"'){ field += '"'; i++; }
        else { inQuotes = false; }
      } else { field += ch; }
    } else {
      if (ch === '"'){ inQuotes = true; }
      else if (ch === ','){ row.push(field); field=''; }
      else if (ch === '\r'){ /* skip */ }
      else if (ch === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else { field += ch; }
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

function setStatus(state, text){
  elStatusDot.className = 'status-dot ' + state;
  elStatusText.textContent = text;
}

async function loadData(){
  setStatus('loading', 'Memuat data terbaru…');
  elInput.disabled = true;
  try{
    const res = await fetch(CSV_URL + '&_=' + Date.now(), {cache:'no-store'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const grid = parseCSV(text);

    let headerRowIdx = grid.findIndex(r => (r[0]||'').trim() === 'Kecamatan');
    if (headerRowIdx === -1) headerRowIdx = 1;

    const rows = [];
    for (let r = headerRowIdx+1; r < grid.length; r++){
      const cols = grid[r];
      if (!cols || cols.length < 5) continue;
      const kec = (cols[0]||'').trim();
      const tf = (cols[1]||'').trim();
      const pml = (cols[2]||'').trim();
      const ppl = (cols[4]||'').trim();
      if (!pml || !ppl) continue;
      if (/total/i.test(pml)) continue;
      rows.push({
        kec, tf, pml, ppl,
        target: toNum(cols[5]),
        kirim: toNum(cols[6]),
        draft: toNum(cols[7]),
        rata: toNum(cols[8]),
        persen: toNum(cols[9]),
      });
    }

    if (rows.length === 0) throw new Error('Data kosong setelah parsing');

    DATA = rows;
    setStatus('ok', 'Data termuat · ' + rows.length.toLocaleString('id-ID') + ' baris PPL');
    elInput.disabled = false;
    elHint.innerHTML = 'Total <b>' + Object.keys(NIP_MAP).length.toLocaleString('id-ID') + '</b> Task Force terdaftar. Gunakan NIP khusus <b>9999</b> untuk melihat opsi seluruh wilayah.';

    const savedNip = loadSavedNip();
    if (savedNip){ elInput.value = savedNip; doSearch(); }
    else { renderEmpty(); }

  }catch(err){
    setStatus('err', 'Gagal memuat data');
    elResult.innerHTML = '<div class="load-error">Gagal mengambil data dari Google Sheets.<br>Penyebab: ' + escapeHtml(err.message) + '</div>';
  }
}

function initSuperDropdowns(){
  const kecamtanSet = new Set();
  DATA.forEach(r => { if(r.kec) kecamtanSet.add(r.kec); });
  
  elFilterKec.innerHTML = '<option value="ALL">-- Semua Kecamatan --</option>' + 
    Array.from(kecamtanSet).sort().map(k => `<option value="${escapeHtml(k)}">${escapeHtml(k)}</option>`).join('');
    
  updateTfPmlDropdown();
}

function updateTfPmlDropdown(){
  const selectedKec = elFilterKec.value;
  const tfPmlSet = new Set();
  
  DATA.forEach(r => {
    if (selectedKec === 'ALL' || r.kec === selectedKec){
      if(r.tf) tfPmlSet.add("TF: " + r.tf);
      if(r.pml) tfPmlSet.add("PML: " + r.pml);
    }
  });
  
  elFilterTfPml.innerHTML = '<option value="ALL">-- Semua Task Force / PML --</option>' + 
    Array.from(tfPmlSet).sort().map(item => `<option value="${escapeHtml(item)}">${escapeHtml(item)}</option>`).join('');
}

function renderEmpty(){
  elSuperFilterArea.style.display = 'none';
  elResult.innerHTML = `
    <div class="empty-state">
      <span class="glyph">[ ? ]</span>
      <p>Belum ada NIP yang dicari.</p>
      <p>Masukkan NIP Task Force di kotak atas untuk menampilkan tim PML dan PPL terkait.</p>
    </div>`;
}

function renderNotFound(nip){
  elSuperFilterArea.style.display = 'none';
  elResult.innerHTML = `<div class="not-found">NIP "${escapeHtml(nip)}" tidak ditemukan pada daftar NIP Task Force.</div>`;
}

function renderResult(nip, tfName){
  let teamRows = [];
  let isSuperView = (nip === '9999');

  if (isSuperView) {
    elSuperFilterArea.style.display = 'flex';
    const selKec = elFilterKec.value || 'ALL';
    const selTfPml = elFilterTfPml.value || 'ALL';
    
    teamRows = DATA.filter(r => {
      const matchKec = (selKec === 'ALL' || r.kec === selKec);
      let matchTfPml = true;
      if (selTfPml !== 'ALL') {
        if (selTfPml.startsWith("TF: ")) {
          matchTfPml = (r.tf === selTfPml.substring(4));
        } else if (selTfPml.startsWith("PML: ")) {
          matchTfPml = (r.pml === selTfPml.substring(5));
        }
      }
      return matchKec && matchTfPml;
    });
  } else {
    elSuperFilterArea.style.display = 'none';
    const tfNameNorm = tfName.trim().toUpperCase();
    teamRows = DATA.filter(r => r.tf.trim().toUpperCase() === tfNameNorm);
  }

  if (teamRows.length === 0){
    elResult.innerHTML = `<div class="not-found">Data tidak ditemukan untuk kriteria filter saat ini.</div>`;
    return;
  }

  const kecLabel = isSuperView ? (elFilterKec.value === 'ALL' ? 'SELURUH WILAYAH' : elFilterKec.value) : teamRows[0].kec;
  const totalTarget = teamRows.reduce((s,r)=> s + (r.target||0), 0);
  const totalKirim = teamRows.reduce((s,r)=> s + (r.kirim||0), 0);
  const totalDraft = teamRows.reduce((s,r)=> s + (r.draft||0), 0);
  const avgPersen = totalTarget > 0 ? (totalKirim/totalTarget*100) : 0;

  const pmlGroups = {};
  teamRows.forEach(r => { (pmlGroups[r.pml] = pmlGroups[r.pml] || []).push(r); });

  const pmlCardsHtml = Object.entries(pmlGroups).map(([pmlName, pplRows], idx) => {
    const pmlTarget = pplRows.reduce((s,r)=> s + (r.target||0), 0);
    const pmlKirim = pplRows.reduce((s,r)=> s + (r.kirim||0), 0);
    const pmlPersen = pmlTarget > 0 ? (pmlKirim/pmlTarget*100) : 0;

    const rowsHtml = pplRows.map(r => {
      const pct = r.persen || 0;
      const pctClass = pct < 2 ? 'low' : '';
      return `
        <tr>
          <td>${escapeHtml(r.ppl)}</td>
          <td class="num">${fmt(r.target)}</td>
          <td class="num">${fmt(r.kirim)}</td>
          <td class="num">${fmt(r.draft)}</td>
          <td class="num">${fmtDec(r.rata)}</td>
          <td class="num">
            <div class="pct-bar-cell">
              <span>${fmtPct(pct)}</span>
              <span class="pct-track"><span class="pct-fill ${pctClass}" style="width:${Math.min(pct,100)}%"></span></span>
            </div>
          </td>
        </tr>`;
    }).join('');

    return `
      <div class="pml-card" data-idx="${idx}">
        <div class="pml-card-top">
          <div class="pml-name-block">
            <p class="pml-name">${escapeHtml(pmlName)}</p>
            <div class="pml-meta">
              <span><b>${pplRows.length}</b> PPL</span>
              <span>Progress: <b>${fmtPct(pmlPersen)}</b></span>
            </div>
          </div>
          <div class="pml-mini-stats">
            <div class="mini-stat"><span class="num">${fmt(pmlTarget)}</span><span class="lbl">Target</span></div>
            <div class="mini-stat"><span class="num">${fmt(pmlKirim)}</span><span class="lbl">Dikirim</span></div>
          </div>
          <div class="chevron">▾</div>
        </div>
        <div class="detail-wrap">
          <div class="detail-inner">
            <table class="ppl-table">
              <caption>Seluruh PPL di bawah ${escapeHtml(pmlName)}</caption>
              <thead>
                <tr>
                  <th>PPL</th><th class="num">Target</th><th class="num">Dikirim</th>
                  <th class="num">Draft</th><th class="num">Rata²/Hari</th><th class="num">Persentase</th>
                </tr>
              </thead>
              <tbody>${rowsHtml}</tbody>
            </table>
          </div>
        </div>
      </div>`;
  }).join('');

  elResult.innerHTML = `
    <div class="tf-header">
      <div class="tf-id">${escapeHtml(kecLabel)} · NIP ${escapeHtml(nip)}</div>
      <p class="tf-name">${escapeHtml(tfName)}</p>
      <div class="tf-stats">
        <div class="stat"><span class="num">${Object.keys(pmlGroups).length}</span><span class="lbl">PML</span></div>
        <div class="stat"><span class="num">${teamRows.length}</span><span class="lbl">Total PPL</span></div>
        <div class="stat"><span class="num">${fmt(totalTarget)}</span><span class="lbl">Target</span></div>
        <div class="stat"><span class="num">${fmt(totalKirim)}</span><span class="lbl">Dikirim</span></div>
        <div class="stat"><span class="num">${fmt(totalDraft)}</span><span class="lbl">Draft</span></div>
        <div class="stat"><span class="num">${fmtPct(avgPersen)}</span><span class="lbl">Progress</span></div>
      </div>
    </div>
    <div class="pml-list">${pmlCardsHtml}</div>`;

  document.querySelectorAll('.pml-card').forEach(card => {
    const top = card.querySelector('.pml-card-top');
    const detail = card.querySelector('.detail-wrap');
    top.addEventListener('click', () => {
      const isOpen = card.classList.toggle('open');
      detail.classList.toggle('open', isOpen);
    });
  });
}

function doSearch(){
  const raw = elInput.value.trim();
  if (!raw){ renderEmpty(); return; }
  const tfName = NIP_MAP[raw];
  if (!tfName){ renderNotFound(raw); return; }
  
  if (raw === '9999' && elFilterKec.options.length === 0) {
    initSuperDropdowns();
  }
  
  renderResult(raw, tfName);
}

function saveNip(nip){
  try{ if (nip){ localStorage.setItem(STORAGE_KEY, nip); } else { localStorage.removeItem(STORAGE_KEY); } }catch(e){}
}
function loadSavedNip(){
  try{ return localStorage.getItem(STORAGE_KEY) || ''; }catch(e){ return ''; }
}

elFilterKec.addEventListener('change', () => {
  updateTfPmlDropdown();
  doSearch();
});

elFilterTfPml.addEventListener('change', () => {
  doSearch();
});

elInput.addEventListener('input', () => { doSearch(); saveNip(elInput.value.trim()); });
elClear.addEventListener('click', () => { elInput.value=''; elInput.focus(); renderEmpty(); saveNip(''); });
elRefreshBtn.addEventListener('click', loadData);

loadData();
</script>
</body>
</html>
